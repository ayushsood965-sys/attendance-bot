<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mock Login Page</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 50px; background-color: #f5f7fa; }
        .login-container { max-width: 400px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #333; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .captcha-box { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .captcha-text { font-size: 1.2em; font-weight: bold; padding: 8px 12px; background: #e2e8f0; border-radius: 4px; border: 1px dashed #cbd5e0; }
        button { width: 100%; padding: 12px; background: #3182ce; color: white; border: none; border-radius: 4px; font-size: 1em; cursor: pointer; }
        button:hover { background: #2b6cb0; }
        .error { color: red; margin-bottom: 15px; font-weight: bold; display: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>System Login (Mock)</h2>
        <div id="error-message" class="error"></div>
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="txtUserId">User ID</label>
                <input type="text" id="txtUserId" required>
            </div>
            <div class="form-group">
                <label for="txtPassword">Password</label>
                <input type="password" id="txtPassword" required>
            </div>
            <div class="form-group">
                <label>Verification Captcha</label>
                <div class="captcha-box">
                    <span id="lblCaptcha" class="captcha-text">8 + 4 = ?</span>
                    <input type="text" id="txtCaptcha" placeholder="Answer" required style="width: 100px;">
                </div>
            </div>
            <button type="submit" id="btnLogin">Sign In</button>
        </form>
    </div>

    <script>
        // Generate random math captcha
        const num1 = Math.floor(Math.random() * 10) + 1;
        const num2 = Math.floor(Math.random() * 10) + 1;
        const correctAnswer = num1 + num2;
        document.getElementById('lblCaptcha').textContent = `${num1} + ${num2} = ?`;

        function handleLogin(event) {
            event.preventDefault();
            const userId = document.getElementById('txtUserId').value;
            const pass = document.getElementById('txtPassword').value;
            const answer = parseInt(document.getElementById('txtCaptcha').value);
            const errorDiv = document.getElementById('error-message');

            if (answer !== correctAnswer) {
                errorDiv.textContent = "Error: Invalid Captcha Code!";
                errorDiv.style.display = "block";
                return;
            }

            if (userId === "SM4113" && pass === "hpu@321") {
                window.location.href = "/dashboard.html";
            } else {
                errorDiv.textContent = "Error: Invalid Username or Password!";
                errorDiv.style.display = "block";
            }
        }
    </script>
</body>
</html>
